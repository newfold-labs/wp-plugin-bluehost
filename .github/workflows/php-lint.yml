name: PHP Lint

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ '**.php' ]
  pull_request:
    branches: [ main ]
    paths: [ '**.php' ]

permissions: {}

jobs:
  php-lint:
    uses: newfold-labs/workflows/.github/workflows/reusable-php-lint.yml@93e85acfbf997f27409792f1f54dabcf890cda6d
    with:
      php-version: '8.1'