name: Deploy Plugin to Server

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        environment: [ bluehost-shared ]
      fail-fast: false

    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Playwright baseURL must match the real WordPress home URL (include subdirectory installs).
      # Trim, default to https, strip trailing slash so /wp-login.php resolves correctly.
      - name: Normalize site URL for Playwright
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          set -euo pipefail
          SITE="${SITE_URL//[[:space:]]/}"
          if [[ -z "$SITE" ]]; then echo "vars.SITE_URL is empty"; exit 1; fi
          if [[ "$SITE" != http://* && "$SITE" != https://* ]]; then SITE="https://$SITE"; fi
          SITE="${SITE%/}"
          echo "BASE_URL=$SITE" >> "$GITHUB_ENV"
          echo "Using BASE_URL=$SITE"

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Composer
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0
        with:
          composer-options: '--no-dev --optimize-autoloader'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

        with:
          node-version: 20
          registry-url: "https://npm.pkg.github.com"
          scope: "@newfold-labs"

      - name: Authenticate with GitHub Packages
        run: |
          echo "@newfold-labs:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NEWFOLD_ACCESS_TOKEN }}" >> .npmrc

      - name: Install Node dependencies and build project
        run: |
          npm install
          npm run build
          npm run create:dev

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: plugin-build-${{ matrix.environment }}
          path: ./${{ vars.PLUGIN_NAME }}.zip

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.SERVER_SSH_PRIVATE_KEY }}" > github-actions
          chmod 600 github-actions

      - name: Copy .zip file to server via SCP
        env:
          PLUGIN_NAME: ${{ vars.PLUGIN_NAME }}
          SERVER_USERNAME: ${{ vars.SERVER_USERNAME }}
          SERVER_IP: ${{ vars.SERVER_IP }}
          SERVER_PATH: ${{ vars.SERVER_PATH }}
        run: scp -i github-actions -o StrictHostKeyChecking=no "./$PLUGIN_NAME.zip" "$SERVER_USERNAME@$SERVER_IP:$SERVER_PATH/wp-content/uploads"

      - name: Extract Plugin and Activate
        env:
          PLUGIN_NAME: ${{ vars.PLUGIN_NAME }}
          SERVER_USERNAME: ${{ vars.SERVER_USERNAME }}
          SERVER_IP: ${{ vars.SERVER_IP }}
          SERVER_PATH: ${{ vars.SERVER_PATH }}
        run: |
          ssh -i github-actions -o StrictHostKeyChecking=no "$SERVER_USERNAME@$SERVER_IP" \
            "PLUGIN_NAME='$PLUGIN_NAME' SERVER_PATH='$SERVER_PATH' bash -s" << 'EOF'
            cd "${SERVER_PATH}/wp-content"
            wp plugin install "uploads/${PLUGIN_NAME}.zip" --force --path=./../
            rm "uploads/${PLUGIN_NAME}.zip"
            wp plugin activate "${PLUGIN_NAME}" --path=./../
          EOF

      - name: Cleanup SSH Key
        run: rm -f github-actions

      - name: Check if the remote Server is up
        run: |
          for _ in {1..30}; do
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${BASE_URL}/wp-login.php")
            if [[ "$STATUS_CODE" == "200" ]]; then
              echo "Server is up with status code: $STATUS_CODE"
              exit 0
            fi
            echo "Waiting for server to be ready... (Last status: $STATUS_CODE)"
            sleep 10
          done
          echo "Server not ready after 5 minutes" && exit 1

      - name: Verify wp-login is WordPress (not 404 HTML)
        run: |
          set -euo pipefail
          LOGIN_URL="${BASE_URL}/wp-login.php"
          BODY_FILE="$(mktemp)"
          CODE=$(curl -sS -o "$BODY_FILE" -w "%{http_code}" "$LOGIN_URL")
          echo "HTTP $CODE for $LOGIN_URL"
          if [[ "$CODE" != "200" ]]; then
            head -c 800 "$BODY_FILE" || true
            exit 1
          fi
          if ! grep -qE 'id="user_login"|name="log"|wp-login' "$BODY_FILE"; then
            echo "Response is not a WordPress login page (check SITE_URL matches WP home, including subdirectory)."
            head -c 1200 "$BODY_FILE" || true
            exit 1
          fi
          rm -f "$BODY_FILE"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          WP_ADMIN_USERNAME: ${{ secrets.WP_ADMIN_USERNAME }}
          WP_ADMIN_PASSWORD: ${{ secrets.WP_ADMIN_PASSWORD }}

      - name: Store Playwright test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report-${{ matrix.environment }}
          path: tests/playwright/test-results/
          retention-days: 10
